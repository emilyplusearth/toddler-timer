<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700;900&family=DM+Mono:wght@300;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0; padding: 0;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --ring-bg: #252837;
    --ring-fill: #f5a623;
    --ring-low: #e05252;
    --text-primary: #f0ede8;
    --text-muted: #7a7d8c;
    --accent: #f5a623;
    --btn-bg: #252837;
    --btn-hover: #2f3347;
    --success: #5cc98a;
    --radius: 20px;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text-primary);
    touch-action: manipulation;
  }

  /* ─── SCREENS ─── */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .screen.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ─── SETUP SCREEN ─── */
  #setup {
    background: var(--bg);
    gap: 0;
    padding: 24px;
  }

  .setup-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 32px;
  }

  .time-picker {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 40px;
  }

  .unit-picker {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .unit-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 2px;
  }

  .pick-btn {
    width: 52px;
    height: 52px;
    background: var(--btn-bg);
    border: none;
    border-radius: 14px;
    color: var(--text-primary);
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .pick-btn:active {
    background: var(--btn-hover);
    transform: scale(0.94);
  }
  .pick-btn svg { pointer-events: none; }

  .unit-display {
    font-family: 'DM Mono', monospace;
    font-size: 56px;
    font-weight: 500;
    color: var(--text-primary);
    width: 110px;
    text-align: center;
    line-height: 1;
    background: var(--surface);
    border-radius: 18px;
    padding: 16px 8px;
    letter-spacing: 0.02em;
  }

  .colon {
    font-family: 'DM Mono', monospace;
    font-size: 56px;
    font-weight: 300;
    color: var(--text-muted);
    margin-top: -8px;
    line-height: 1;
    align-self: center;
    padding-bottom: 4px;
  }

  .start-btn {
    width: 220px;
    height: 64px;
    background: var(--accent);
    border: none;
    border-radius: 32px;
    color: #0f1117;
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
    box-shadow: 0 8px 32px rgba(245,166,35,0.35);
  }
  .start-btn:active {
    transform: scale(0.96);
    box-shadow: 0 4px 16px rgba(245,166,35,0.25);
  }

  .quick-chips {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 300px;
  }

  .chip {
    padding: 9px 15px;
    background: var(--surface);
    border: 1.5px solid var(--ring-bg);
    border-radius: 22px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 800;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .chip:active, .chip.tapped {
    background: rgba(245,166,35,0.12);
    color: var(--accent);
    border-color: var(--accent);
    transform: scale(0.94);
  }

  .chips-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    margin-top: -8px;
  }

  .hint {
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.6;
    max-width: 260px;
  }
  .hint strong { color: var(--accent); }

  /* ─── TIMER SCREEN ─── */
  #timer {
    background: var(--bg);
    cursor: default;
  }

  .ring-wrap {
    position: relative;
    width: min(80vw, 80vh, 340px);
    height: min(80vw, 80vh, 340px);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ring-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .ring-bg-circle {
    fill: none;
    stroke: var(--ring-bg);
    stroke-width: 14;
  }

  .ring-progress {
    fill: none;
    stroke: var(--ring-fill);
    stroke-width: 14;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.8s linear, stroke 0.5s;
  }

  .ring-center {
    position: relative;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .timer-display {
    font-family: 'DM Mono', monospace;
    font-size: clamp(52px, 14vw, 80px);
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: 0.04em;
    line-height: 1;
    transition: color 0.5s;
  }

  .timer-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 6px;
  }

  /* ─── HOLD INDICATOR (two-finger arc, centered between fingers) ─── */
  #hold-indicator {
    position: fixed;
    width: 88px;
    height: 88px;
    pointer-events: none;
    opacity: 0;
    transform: translate(-50%, -50%);
    transition: opacity 0.2s;
    z-index: 50;
  }
  #hold-indicator.visible { opacity: 1; }
  #hold-ring {
    fill: none;
    stroke: var(--accent);
    stroke-width: 4;
    stroke-linecap: round;
    transform-origin: 44px 44px;
    transform: rotate(-90deg);
    stroke-dasharray: 125.66;
    stroke-dashoffset: 125.66;
  }
  #hold-bg { fill: rgba(15,17,23,0.65); }
  #hold-fingers {
    font-size: 18px;
    text-anchor: middle;
    dominant-baseline: central;
    fill: var(--accent);
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
  }

  /* ─── SHARED OVERLAY BASE ─── */
  .full-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 11, 17, 0.92);
    backdrop-filter: blur(18px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 100;
  }
  .full-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .overlay-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .unlock-time {
    font-family: 'DM Mono', monospace;
    font-size: 48px;
    font-weight: 500;
    color: var(--text-primary);
  }

  /* ─── PIN OVERLAY ─── */
  .pin-dots {
    display: flex;
    gap: 14px;
    margin: 4px 0 8px;
  }
  .pin-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--ring-bg);
    border: 2px solid var(--text-muted);
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .pin-dot.filled {
    background: var(--accent);
    border-color: var(--accent);
    transform: scale(1.15);
  }
  .pin-dot.error {
    background: var(--ring-low);
    border-color: var(--ring-low);
  }

  .pin-pad {
    display: grid;
    grid-template-columns: repeat(3, 72px);
    grid-template-rows: repeat(4, 64px);
    gap: 10px;
  }
  .pin-key {
    background: var(--surface);
    border: none;
    border-radius: 14px;
    color: var(--text-primary);
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.12s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pin-key:active { background: var(--btn-hover); transform: scale(0.93); }
  .pin-key.wide { grid-column: span 1; }
  .pin-key.del { font-size: 18px; color: var(--text-muted); }
  .pin-key.empty { background: transparent; pointer-events: none; }

  .pin-error-msg {
    font-size: 12px;
    color: var(--ring-low);
    font-weight: 700;
    letter-spacing: 0.08em;
    height: 16px;
    transition: opacity 0.2s;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-6px); }
    80%      { transform: translateX(6px); }
  }
  .shake { animation: shake 0.35s ease; }

  /* ─── CONTROLS OVERLAY ─── */
  .overlay-btns {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 260px;
  }
  .overlay-btn {
    height: 58px;
    border: none;
    border-radius: 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.1s, filter 0.15s;
  }
  .overlay-btn:active { transform: scale(0.96); filter: brightness(0.9); }
  .btn-resume  { background: var(--accent); color: #0f1117; box-shadow: 0 6px 24px rgba(245,166,35,0.3); }
  .btn-restart { background: var(--surface); color: var(--text-primary); }
  .btn-stop    { background: transparent; color: var(--text-muted); border: 1.5px solid var(--ring-bg); font-size: 14px; }

  .lock-icon { width: 36px; height: 36px; opacity: 0.4; }

  /* ─── SET PIN (setup screen) ─── */
  .set-pin-link {
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    letter-spacing: 0.06em;
    text-decoration: underline;
    text-underline-offset: 3px;
    background: none;
    border: none;
    font-family: 'Nunito', sans-serif;
  }
  .set-pin-link:active { color: var(--accent); }

  /* ─── DONE SCREEN ─── */
  #done {
    background: var(--bg);
    gap: 20px;
  }

  .done-icon {
    width: 90px;
    height: 90px;
    background: rgba(92,201,138,0.12);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse-done 1.5s ease-in-out infinite;
  }

  @keyframes pulse-done {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(92,201,138,0.3); }
    50% { transform: scale(1.04); box-shadow: 0 0 0 16px rgba(92,201,138,0); }
  }

  .done-title {
    font-size: 32px;
    font-weight: 900;
    color: var(--success);
  }

  .done-sub {
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .done-btn {
    margin-top: 12px;
    width: 200px;
    height: 56px;
    background: var(--success);
    border: none;
    border-radius: 28px;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #0f1117;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(92,201,138,0.3);
    transition: transform 0.15s;
  }
  .done-btn:active { transform: scale(0.96); }

  /* ─── MISC ─── */
  .badge {
    position: fixed;
    top: env(safe-area-inset-top, 16px);
    right: 16px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .badge.visible { opacity: 1; }
  .badge-dot {
    width: 6px; height: 6px;
    background: var(--ring-low);
    border-radius: 50%;
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; } 50% { opacity: 0.2; }
  }

  /* repeating dots bg pattern */
  #timer::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- ── SETUP SCREEN ── -->
<div id="setup" class="screen active">
  <p class="setup-title">Set Timer</p>

  <div class="time-picker">
    <div class="unit-picker">
      <span class="unit-label">Minutes</span>
      <button class="pick-btn" id="min-up" aria-label="Increase minutes">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 13l5-6 5 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="unit-display" id="min-display">00</div>
      <button class="pick-btn" id="min-down" aria-label="Decrease minutes">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 7l5 6 5-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="colon">:</div>

    <div class="unit-picker">
      <span class="unit-label">Seconds</span>
      <button class="pick-btn" id="sec-up" aria-label="Increase seconds">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 13l5-6 5 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="unit-display" id="sec-display">00</div>
      <button class="pick-btn" id="sec-down" aria-label="Decrease seconds">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 7l5 6 5-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <p class="chips-label">Quick Set</p>
  <div class="quick-chips">
    <button class="chip" data-mins="5">5 min</button>
    <button class="chip" data-mins="10">10 min</button>
    <button class="chip" data-mins="15">15 min</button>
    <button class="chip" data-mins="20">20 min</button>
    <button class="chip" data-mins="30">30 min</button>
    <button class="chip" data-mins="45">45 min</button>
    <button class="chip" data-mins="60">1 hr</button>
  </div>

  <button class="start-btn" id="start-btn">Start Timer</button>
  <p class="hint">While running, <strong>hold 2 fingers for 3 sec</strong> then enter your PIN to access controls.</p>
  <button class="set-pin-link" id="set-pin-link">Change PIN (default: 1234)</button>
</div>

<!-- ── TIMER SCREEN ── -->
<div id="timer" class="screen">
  <div class="badge" id="running-badge">
    <span class="badge-dot"></span> Running
  </div>
  <div class="ring-wrap" id="ring-wrap">
    <svg class="ring-svg" viewBox="0 0 120 120" id="ring-svg">
      <circle class="ring-bg-circle" cx="60" cy="60" r="52"/>
      <circle class="ring-progress" id="ring-progress" cx="60" cy="60" r="52"/>
    </svg>
    <div class="ring-center">
      <div class="timer-display" id="timer-display">00:00</div>
      <div class="timer-label">remaining</div>
    </div>
  </div>
</div>

<!-- ── DONE SCREEN ── -->
<div id="done" class="screen">
  <div class="done-icon">
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
      <path d="M9 22l10 10L35 12" stroke="#5cc98a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="done-title">Time's Up!</div>
  <div class="done-sub">Timer complete</div>
  <button class="done-btn" id="done-btn">New Timer</button>
</div>

<!-- ── HOLD INDICATOR (two-finger) ── -->
<svg id="hold-indicator" viewBox="0 0 88 88">
  <circle id="hold-bg" cx="44" cy="44" r="42"/>
  <circle id="hold-ring" cx="44" cy="44" r="20"/>
  <text id="hold-fingers" x="44" y="44">2</text>
</svg>

<!-- ── PIN OVERLAY ── -->
<div id="pin-overlay" class="full-overlay">
  <svg class="lock-icon" viewBox="0 0 40 40" fill="none">
    <rect x="8" y="18" width="24" height="18" rx="4" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <path d="M13 18v-5a7 7 0 0114 0v5" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="20" cy="27" r="2.5" fill="rgba(255,255,255,0.3)"/>
  </svg>
  <p class="overlay-label" id="pin-label">Enter PIN</p>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="dot-0"></div>
    <div class="pin-dot" id="dot-1"></div>
    <div class="pin-dot" id="dot-2"></div>
    <div class="pin-dot" id="dot-3"></div>
  </div>
  <div class="pin-error-msg" id="pin-error"></div>
  <div class="pin-pad" id="pin-pad">
    <button class="pin-key" data-val="1">1</button>
    <button class="pin-key" data-val="2">2</button>
    <button class="pin-key" data-val="3">3</button>
    <button class="pin-key" data-val="4">4</button>
    <button class="pin-key" data-val="5">5</button>
    <button class="pin-key" data-val="6">6</button>
    <button class="pin-key" data-val="7">7</button>
    <button class="pin-key" data-val="8">8</button>
    <button class="pin-key" data-val="9">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" data-val="0">0</button>
    <button class="pin-key del" id="pin-del">⌫</button>
  </div>
  <button class="overlay-btn btn-stop" id="pin-cancel" style="width:200px;margin-top:4px;">Cancel</button>
</div>

<!-- ── CONTROLS OVERLAY ── -->
<div id="controls-overlay" class="full-overlay">
  <p class="overlay-label">Timer Controls</p>
  <div class="unlock-time" id="overlay-time">00:00</div>
  <div class="overlay-btns">
    <button class="overlay-btn btn-resume" id="btn-resume">▶ Resume</button>
    <button class="overlay-btn btn-restart" id="btn-restart">↺ Restart</button>
    <button class="overlay-btn btn-stop" id="btn-stop">✕ Cancel Timer</button>
  </div>
</div>

<!-- ── SET PIN OVERLAY ── -->
<div id="setpin-overlay" class="full-overlay">
  <p class="overlay-label" id="setpin-label">Enter New PIN</p>
  <div class="pin-dots" id="setpin-dots">
    <div class="pin-dot" id="sdot-0"></div>
    <div class="pin-dot" id="sdot-1"></div>
    <div class="pin-dot" id="sdot-2"></div>
    <div class="pin-dot" id="sdot-3"></div>
  </div>
  <div class="pin-error-msg" id="setpin-error"></div>
  <div class="pin-pad">
    <button class="pin-key" data-setval="1">1</button>
    <button class="pin-key" data-setval="2">2</button>
    <button class="pin-key" data-setval="3">3</button>
    <button class="pin-key" data-setval="4">4</button>
    <button class="pin-key" data-setval="5">5</button>
    <button class="pin-key" data-setval="6">6</button>
    <button class="pin-key" data-setval="7">7</button>
    <button class="pin-key" data-setval="8">8</button>
    <button class="pin-key" data-setval="9">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" data-setval="0">0</button>
    <button class="pin-key del" id="setpin-del">⌫</button>
  </div>
  <button class="overlay-btn btn-stop" id="setpin-cancel" style="width:200px;margin-top:4px;">Cancel</button>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let totalSeconds = 0;
let remainingSeconds = 0;
let timerInterval = null;
let isPaused = false;
let isDone = false;

// ─── DOM REFS ────────────────────────────────────────────────────────────────
const setupScreen    = document.getElementById('setup');
const timerScreen    = document.getElementById('timer');
const doneScreen     = document.getElementById('done');
const minDisplay     = document.getElementById('min-display');
const secDisplay     = document.getElementById('sec-display');
const timerDisplay   = document.getElementById('timer-display');
const overlayTime    = document.getElementById('overlay-time');
const ringProgress   = document.getElementById('ring-progress');
const holdIndicator  = document.getElementById('hold-indicator');
const holdRing       = document.getElementById('hold-ring');
const runningBadge   = document.getElementById('running-badge');

let mins = 0, secs = 0;

// ─── CIRCUMFERENCE ───────────────────────────────────────────────────────────
const CIRCUM = 2 * Math.PI * 52; // r=52
ringProgress.style.strokeDasharray = CIRCUM;
ringProgress.style.strokeDashoffset = 0;

// ─── DISPLAY HELPERS ─────────────────────────────────────────────────────────
function pad(n) { return String(n).padStart(2, '0'); }
function fmtTime(s) { return `${pad(Math.floor(s / 60))}:${pad(s % 60)}`; }

function updateSetupDisplay() {
  minDisplay.textContent = pad(mins);
  secDisplay.textContent = pad(secs);
}

function updateRing(remaining, total) {
  const pct = total > 0 ? remaining / total : 0;
  ringProgress.style.strokeDashoffset = CIRCUM * (1 - pct);
  // Color shift: orange → red in last 20%
  if (pct <= 0.2 && total >= 10) {
    ringProgress.style.stroke = 'var(--ring-low)';
    timerDisplay.style.color = 'var(--ring-low)';
  } else {
    ringProgress.style.stroke = 'var(--ring-fill)';
    timerDisplay.style.color = 'var(--text-primary)';
  }
}

// ─── SETUP BUTTONS ───────────────────────────────────────────────────────────
function addHold(btn, onTick) {
  let interval, delay;
  let lastTouchTime = 0;

  const start = () => {
    onTick();
    delay = setTimeout(() => { interval = setInterval(onTick, 80); }, 400);
  };
  const stop = () => {
    clearTimeout(delay);
    clearInterval(interval);
  };

  // Touch — record timestamp so we can suppress the ghost mousedown Android fires afterward
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    lastTouchTime = Date.now();
    start();
  }, { passive: false });
  btn.addEventListener('touchend',    stop);
  btn.addEventListener('touchcancel', stop);

  // Mouse — skip if fired within 500ms of a touch (it's just the synthetic ghost event)
  btn.addEventListener('mousedown', () => {
    if (Date.now() - lastTouchTime < 500) return;
    start();
  });
  btn.addEventListener('mouseup',    stop);
  btn.addEventListener('mouseleave', stop);
}

addHold(document.getElementById('min-up'), () => {
  const total = mins * 60 + secs + 60;
  if (total <= 3600) { mins = Math.min(60, mins + 1); if (mins === 60) secs = 0; }
  updateSetupDisplay();
});
addHold(document.getElementById('min-down'), () => {
  if (mins > 0) mins--;
  updateSetupDisplay();
});
addHold(document.getElementById('sec-up'), () => {
  if (mins >= 60) return;
  secs = (secs + 1) % 60;
  updateSetupDisplay();
});
addHold(document.getElementById('sec-down'), () => {
  secs = (secs - 1 + 60) % 60;
  updateSetupDisplay();
});

// ─── QUICK-SET CHIPS ─────────────────────────────────────────────────────────
document.querySelectorAll('.chip').forEach(chip => {
  let lastTouch = 0;
  const setTime = () => {
    const m = parseInt(chip.dataset.mins);
    mins = m; secs = 0;
    updateSetupDisplay();
    chip.classList.add('tapped');
    setTimeout(() => chip.classList.remove('tapped'), 200);
  };
  chip.addEventListener('touchstart', e => { e.preventDefault(); lastTouch = Date.now(); setTime(); }, { passive: false });
  chip.addEventListener('mousedown', () => { if (Date.now() - lastTouch < 500) return; setTime(); });
});

// ─── AUDIO ALARM ─────────────────────────────────────────────────────────────
let audioCtx = null;
let alarmInterval = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playAlarmOnce() {
  try {
    const ctx = getAudioCtx();
    const freqs = [660, 660, 784, 784];
    const beepDur = 0.22;
    const gap = 0.12;
    freqs.forEach((freq, i) => {
      const t = ctx.currentTime + i * (beepDur + gap);
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.22, t + 0.025);
      gain.gain.setValueAtTime(0.22, t + beepDur - 0.06);
      gain.gain.linearRampToValueAtTime(0, t + beepDur);
      osc.start(t);
      osc.stop(t + beepDur + 0.01);
    });
  } catch(_) {}
}

function startAlarm() {
  stopAlarm(); // clear any previous
  playAlarmOnce();
  if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 600]);
  // repeat every 4 seconds until dismissed
  alarmInterval = setInterval(() => {
    playAlarmOnce();
    if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 600]);
  }, 2000);
}

function stopAlarm() {
  clearInterval(alarmInterval);
  alarmInterval = null;
  if (navigator.vibrate) navigator.vibrate(0); // cancel any ongoing vibration
}

// ─── START TIMER ─────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', () => {
  getAudioCtx(); // unlock AudioContext on user gesture (required by iOS/Android)
  totalSeconds = mins * 60 + secs;
  if (totalSeconds === 0) {
    minDisplay.style.animation = 'none';
    minDisplay.style.color = 'var(--ring-low)';
    setTimeout(() => { minDisplay.style.color = ''; }, 600);
    return;
  }
  remainingSeconds = totalSeconds;
  isPaused = false;
  isDone = false;
  showScreen(timerScreen);
  runningBadge.classList.add('visible');
  startCountdown();
});

// ─── COUNTDOWN ───────────────────────────────────────────────────────────────
let timerEndTime = null; // absolute timestamp when timer will reach 0

function startCountdown() {
  clearInterval(timerInterval);
  timerEndTime = Date.now() + remainingSeconds * 1000;
  renderTimer();
  timerInterval = setInterval(tickTimer, 500);
}

function tickTimer() {
  if (isPaused) return;
  const left = Math.round((timerEndTime - Date.now()) / 1000);
  remainingSeconds = Math.max(0, left);
  renderTimer();
  if (remainingSeconds <= 0) {
    clearInterval(timerInterval);
    timerInterval = null;
    timerFinished();
  }
}

function renderTimer() {
  timerDisplay.textContent = fmtTime(remainingSeconds);
  overlayTime.textContent  = fmtTime(remainingSeconds);
  updateRing(remainingSeconds, totalSeconds);
}

function timerFinished() {
  isDone = true;
  runningBadge.classList.remove('visible');
  // close any open overlays
  document.getElementById('pin-overlay').classList.remove('visible');
  document.getElementById('controls-overlay').classList.remove('visible');
  startAlarm();
  showScreen(doneScreen);
}

// ─── DONE ────────────────────────────────────────────────────────────────────
document.getElementById('done-btn').addEventListener('click', () => {
  stopAlarm();
  isDone = false;
  timerInterval = null;
  showScreen(setupScreen);
});

// ─── SCREEN SWITCHER ─────────────────────────────────────────────────────────
function showScreen(screen) {
  [setupScreen, timerScreen, doneScreen].forEach(s => s.classList.remove('active'));
  screen.classList.add('active');
}

// ─── PIN STATE ───────────────────────────────────────────────────────────────
let savedPin = localStorage.getItem('timerPin') || '1234';
let pinEntry = '';
let pinMode = 'verify'; // 'verify' | 'set-new' | 'set-confirm'
let pinNewTemp = '';

const pinOverlay      = document.getElementById('pin-overlay');
const controlsOverlay = document.getElementById('controls-overlay');
const setpinOverlay   = document.getElementById('setpin-overlay');
const pinLabel        = document.getElementById('pin-label');
const pinError        = document.getElementById('pin-error');
const setpinLabel     = document.getElementById('setpin-label');
const setpinError     = document.getElementById('setpin-error');

function updatePinDots(entry, prefix) {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById(`${prefix}${i}`);
    dot.classList.toggle('filled', i < entry.length);
    dot.classList.remove('error');
  }
}

function showPinError(msg, prefix) {
  const el = document.getElementById(prefix === 'dot-' ? 'pin-error' : 'setpin-error');
  el.textContent = msg;
  const dots = document.getElementById(prefix === 'dot-' ? 'pin-dots' : 'setpin-dots');
  for (let i = 0; i < 4; i++) document.getElementById(`${prefix}${i}`).classList.add('error');
  dots.classList.add('shake');
  setTimeout(() => {
    dots.classList.remove('shake');
    for (let i = 0; i < 4; i++) document.getElementById(`${prefix}${i}`).classList.remove('error');
    el.textContent = '';
  }, 600);
}

// PIN keypad — verify mode
document.querySelectorAll('#pin-pad .pin-key[data-val]').forEach(k => {
  let lastTouch = 0;
  const press = () => {
    if (pinEntry.length >= 4) return;
    pinEntry += k.dataset.val;
    updatePinDots(pinEntry, 'dot-');
    if (pinEntry.length === 4) {
      setTimeout(() => {
        if (pinEntry === savedPin) {
          pinEntry = '';
          updatePinDots('', 'dot-');
          pinOverlay.classList.remove('visible');
          controlsOverlay.classList.add('visible');
        } else {
          showPinError('Incorrect PIN', 'dot-');
          pinEntry = '';
          setTimeout(() => updatePinDots('', 'dot-'), 650);
        }
      }, 120);
    }
  };
  k.addEventListener('touchstart', e => { e.preventDefault(); lastTouch = Date.now(); press(); }, { passive: false });
  k.addEventListener('mousedown', () => { if (Date.now() - lastTouch < 500) return; press(); });
});

document.getElementById('pin-del').addEventListener('click', () => {
  pinEntry = pinEntry.slice(0, -1);
  updatePinDots(pinEntry, 'dot-');
  pinError.textContent = '';
});

document.getElementById('pin-cancel').addEventListener('click', () => {
  pinEntry = '';
  updatePinDots('', 'dot-');
  pinError.textContent = '';
  pinOverlay.classList.remove('visible');
  timerEndTime = Date.now() + remainingSeconds * 1000;
  isPaused = false;
});

// SET PIN flow
document.getElementById('set-pin-link').addEventListener('click', () => {
  pinNewTemp = '';
  pinEntry = '';
  setpinLabel.textContent = 'Enter New PIN';
  setpinError.textContent = '';
  updatePinDots('', 'sdot-');
  pinMode = 'set-new';
  setpinOverlay.classList.add('visible');
});

document.querySelectorAll('[data-setval]').forEach(k => {
  let lastTouch = 0;
  const press = () => {
    if (pinMode === 'set-new') {
      if (pinNewTemp.length >= 4) return;
      pinNewTemp += k.dataset.setval;
      updatePinDots(pinNewTemp, 'sdot-');
      if (pinNewTemp.length === 4) {
        setTimeout(() => {
          setpinLabel.textContent = 'Confirm New PIN';
          pinMode = 'set-confirm';
          updatePinDots('', 'sdot-');
          setpinError.textContent = '';
        }, 200);
      }
    } else if (pinMode === 'set-confirm') {
      let confirm = setpinOverlay.dataset.confirm || '';
      if (confirm.length >= 4) return;
      confirm += k.dataset.setval;
      setpinOverlay.dataset.confirm = confirm;
      updatePinDots(confirm, 'sdot-');
      if (confirm.length === 4) {
        setTimeout(() => {
          if (confirm === pinNewTemp) {
            savedPin = pinNewTemp;
            localStorage.setItem('timerPin', savedPin);
            document.getElementById('set-pin-link').textContent = 'Change PIN';
            setpinOverlay.classList.remove('visible');
            setpinOverlay.dataset.confirm = '';
            pinNewTemp = '';
            pinMode = 'verify';
          } else {
            showPinError("PINs don't match", 'sdot-');
            setpinOverlay.dataset.confirm = '';
            setTimeout(() => updatePinDots('', 'sdot-'), 650);
            pinMode = 'set-new';
            pinNewTemp = '';
            setTimeout(() => { setpinLabel.textContent = 'Enter New PIN'; }, 700);
          }
        }, 120);
      }
    }
  };
  k.addEventListener('touchstart', e => { e.preventDefault(); lastTouch = Date.now(); press(); }, { passive: false });
  k.addEventListener('mousedown', () => { if (Date.now() - lastTouch < 500) return; press(); });
});

document.getElementById('setpin-del').addEventListener('click', () => {
  if (pinMode === 'set-new') {
    pinNewTemp = pinNewTemp.slice(0, -1);
    updatePinDots(pinNewTemp, 'sdot-');
  } else {
    let confirm = setpinOverlay.dataset.confirm || '';
    confirm = confirm.slice(0, -1);
    setpinOverlay.dataset.confirm = confirm;
    updatePinDots(confirm, 'sdot-');
  }
});

document.getElementById('setpin-cancel').addEventListener('click', () => {
  setpinOverlay.classList.remove('visible');
  setpinOverlay.dataset.confirm = '';
  pinNewTemp = '';
  pinMode = 'verify';
});

// ─── TWO-FINGER HOLD-TO-UNLOCK ────────────────────────────────────────────────
const HOLD_DURATION = 3000;
let holdTimeout    = null;
let holdStart      = null;
let holdAnimFrame  = null;
const CIRC_HOLD    = 2 * Math.PI * 20; // r=20

function startHold(midX, midY) {
  if (isDone) return;
  holdStart = performance.now();
  holdIndicator.style.left = midX + 'px';
  holdIndicator.style.top  = midY + 'px';
  holdIndicator.classList.add('visible');
  holdRing.style.strokeDasharray  = CIRC_HOLD;
  holdRing.style.strokeDashoffset = CIRC_HOLD;
  animateHold();
  holdTimeout = setTimeout(() => {
    cancelHold();
    isPaused = true;
    pinEntry = '';
    updatePinDots('', 'dot-');
    pinError.textContent = '';
    pinLabel.textContent = 'Enter PIN';
    pinOverlay.classList.add('visible');
  }, HOLD_DURATION);
}

function animateHold() {
  if (!holdStart) return;
  const pct = Math.min((performance.now() - holdStart) / HOLD_DURATION, 1);
  holdRing.style.strokeDashoffset = CIRC_HOLD * (1 - pct);
  if (pct < 1) holdAnimFrame = requestAnimationFrame(animateHold);
}

function cancelHold() {
  clearTimeout(holdTimeout);
  cancelAnimationFrame(holdAnimFrame);
  holdStart = null;
  holdIndicator.classList.remove('visible');
}

// Exactly-2-finger detection — cancel if fingers go above or below 2
timerScreen.addEventListener('touchstart', e => {
  if (pinOverlay.classList.contains('visible') ||
      controlsOverlay.classList.contains('visible')) return;
  if (e.touches.length === 2) {
    const t1 = e.touches[0], t2 = e.touches[1];
    const midX = (t1.clientX + t2.clientX) / 2;
    const midY = (t1.clientY + t2.clientY) / 2;
    startHold(midX, midY);
  } else {
    cancelHold(); // 1 finger or 3+ fingers — cancel immediately
  }
}, { passive: true });

timerScreen.addEventListener('touchend', e => {
  if (e.touches.length < 2) cancelHold();
}, { passive: true });

timerScreen.addEventListener('touchcancel', () => cancelHold(), { passive: true });

// ─── CONTROLS OVERLAY ────────────────────────────────────────────────────────
function hideControlsOverlay() {
  controlsOverlay.classList.remove('visible');
}

document.getElementById('btn-resume').addEventListener('click', () => {
  // Recalculate end time from current remaining so pause duration isn't counted
  timerEndTime = Date.now() + remainingSeconds * 1000;
  isPaused = false;
  hideControlsOverlay();
});

document.getElementById('btn-restart').addEventListener('click', () => {
  hideControlsOverlay();
  remainingSeconds = totalSeconds;
  isPaused = false;
  startCountdown();
});

document.getElementById('btn-stop').addEventListener('click', () => {
  clearInterval(timerInterval);
  timerInterval = null;
  isPaused = false;
  isDone = false;
  hideControlsOverlay();
  runningBadge.classList.remove('visible');
  showScreen(setupScreen);
});

// ─── PREVENT CONTEXT MENU / RIGHT CLICK ──────────────────────────────────────
document.addEventListener('contextmenu', e => e.preventDefault());

// ─── KEEP SCREEN AWAKE (Wake Lock API) ───────────────────────────────────────
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch (_) {}
}
requestWakeLock();

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    requestWakeLock();

    // Recalculate remaining time based on wall clock (fixes blank screen after lock)
    if (timerInterval && !isPaused && timerEndTime) {
      const left = Math.round((timerEndTime - Date.now()) / 1000);
      remainingSeconds = Math.max(0, left);
      if (remainingSeconds <= 0) {
        clearInterval(timerInterval);
        timerFinished();
        return;
      }
    }

    // Force the correct screen to be visible (fixes blank screen)
    if (isDone) {
      showScreen(doneScreen);
      // Restart alarm if it was suspended while phone was locked
      if (!alarmInterval) startAlarm();
    } else if (timerInterval !== null || isPaused) {
      showScreen(timerScreen);
      renderTimer();
    } else {
      showScreen(setupScreen);
    }
  } else {
    // Phone is locking/backgrounding — snapshot remaining time for when we return
    if (!isPaused && timerEndTime) {
      remainingSeconds = Math.max(0, Math.round((timerEndTime - Date.now()) / 1000));
    }
  }
});

// ─── INIT ────────────────────────────────────────────────────────────────────
stopAlarm(); // safety: kill any alarm left over from a cached page restore
updateSetupDisplay();
showScreen(setupScreen); // always start on setup screen on fresh load
</script>
</body>
